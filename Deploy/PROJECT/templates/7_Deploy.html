@keyframes move-up6 {

    }
  }

a {
    text-decoration: none;
}

.login {
    position: relative;
    width: 850px;
    padding: 30px;
    height: fit-content;
    background-color: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 15px;
    z-index: 10;
    backdrop-filter: blur(25px);
    box-shadow: 10px 10px 40px rgba(0, 0, 0, 0.2),
    -10px -10px 40px rgba(0, 0, 0, 0.2);
    
}

@media (max-width:400px) {
    .login {
        width: 90%;
    }
}

.login h1 {
    font-size: 1.8rem;
    color: #fff;
    margin-bottom: 40px;
    margin-top: 0;
    text-align: center;
}

.login form {
    width: 100%;
    height: 100%;
    outline: none;
    border: none;
}

.login form .input-box {
    width: 100%;
    position: relative;
    margin-bottom: 30px;
    display: flex;
}

.login form .input-box input {
    width: 100%;
    border: none;
    padding: 1rem 2.7rem 1rem 1rem;
    border-radius: 10px;
    color: #fff;
    background-color: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.4);
}

.login form .input-box input::placeholder {
    color: #fff;
    font-size: 0.8rem;
    transition: 0.5s ease;
}

.login form .input-box input:focus::placeholder {
    opacity: 0;
}

.login form .input-box input:focus {
    outline: none;
}

.login form .input-box i {
    position: absolute;
    top: 50%;
    right: 15px;
    transform: translateY(-50%);
    color: #fff;
    font-size: 1.2rem;
}

.login form .rembar {
    margin-bottom: 30px;
    width: 100%;
}

.login form .rembar input {
    appearance: none;
}

.login form .rembar label {
    color: #fff;
    position: relative;
    width: 100%;
    padding-left: 35px;
    font-size: 0.9rem;
}

.login form .rembar label::before {
    content: "";
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.2);
}

.login form .rembar label::after {
    content: "";
    position: absolute;
    left: 4px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background-color: #fff;
    transition: 0.5 ease;
    opacity: 0;
    box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
}

.login form .rembar input:checked + label::after {
    opacity: 1;
}

.login form button {
    width: 100%;
    border: none;
    padding: 1rem 1rem 1rem 2.7rem;
    border-radius: 10px;
    color: #fff;
    margin-bottom: 30px;
    background-color: #161623;
    border: 1px solid rgba(255, 255, 255, 0.4);
    transition: 0.5s ease;
    cursor: pointer;
    font-weight: 600;
}

.login form button:hover {
    background-color: #111;
}

.login form .links {
    width: 100%;
    display: flex;
    justify-content: space-between;
    gap: 15px;
}
.btn-custom {
  background-color: #007bff;
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 5px;
  text-decoration: none;
  font-size: 14px;
  transition: background-color 0.3s ease;
}
.btn-custom:hover {
  background-color: #0056b3;
}

.login form .links a {
    color: #fff;
    font-weight: 100;
    font-size: 0.7rem;
}
</style>

          </a><br><br>

              {% csrf_token %}
              <label for="selectRole" style="color: yellow;">Open</label>

                </div>

                <div class="input-box">
                  
                  <input id="selectRole" step="0.000005" name="High" required>
                </div>
                <label for="selectRole" style='color: yellow;'>Low</label>
                <div class="input-box">
                  
                  <input id="selectRole" step="0.000005" name="Low" required>
              </div>
              <label for="selectRole" style='color: yellow;'>Volume</label>
              <div class="input-box">
                
                <input id="selectRole" name="Volume" required>
          
              </div>
    
                
                <button type="submit">SUBMIT</button>
    
                
                
          
                
          
               
          
               
               
                
    
            </form>
    
        </div><!-- End Login -->
    
    </div>
